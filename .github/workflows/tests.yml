name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: pytest on ${{ matrix.os }} · py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package (with test extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Run fast test suite
        run: pytest -v

      - name: Run slow regression tests
        # The slow suite includes the bit-identicality contract against the
        # pickled c=13 N=100 T=800 dps=150 reference. Budget: ~60s.
        run: pytest -v -m slow --timeout=600
